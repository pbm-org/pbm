version: v0.0.1
deps:
  - repo: "https://github.com/google/common-protos.git"
    ref: "master"
  - repo: "git@github.com:my-org/base-proto.git"
    ref: "v1.0.2"
  - dir: "local/dir1"
  - dir: "local1/dir2"
gen:
  - language: "go"
    out: "."
    opt:
      - paths=source_relative
  - language: "dart"
    out: "./gen_dart"
input:
  - proto/proto1.proto
  - git@github.com:labulakalia/pbb.git
  - proto_dir
lint:
  - opt:
      - a=a
      - b=b
