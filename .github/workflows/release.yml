name: Release

on:
  push:
    tags: "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Test
        run: go test -v ./...

      - name: Build
        run: make build-all

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: build
          files: |
            *
